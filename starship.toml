# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 9000

# Inserts a blank line between shell prompts
add_newline = true

[character] # The name of the module we are configuring is 'character'
success_symbol = '[ï„…](bold green)'
error_symbol = '[ï„…](bold red)'

vimcmd_symbol = '[ï„„](bold green)'
vimcmd_visual_symbol = '[ï„„](bold yellow)'
vimcmd_replace_symbol = '[ï„„](bold purple)'
vimcmd_replace_one_symbol = '[ï„„](bold purple)'

[git_status]
format = '($ahead_behind )($conflicted$deleted$renamed$modified$staged$untracked$stashed)'
ahead = '[â†‘${count}](green)'
behind = '[â†“${count}](red)'
diverged = '[â†‘${ahead_count}](green) [â†“${behind_count}](red)'
conflicted = '[\[=\]](red) '
deleted = '[\[âœ˜\]](red) '
renamed = '[\[Â»\]](red) '
modified = '[\[!\]](red) '
staged = '[\[+\]](red) '
untracked = '[\[?\]](red) '
stashed = '[\[$\]](red) '

[username]
disabled = true
[hostname]
disabled = true
