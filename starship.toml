# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 9000

# Inserts a blank line between shell prompts
add_newline = true

[character] # The name of the module we are configuring is 'character'
success_symbol = '[ď„…](bold green)'
error_symbol = '[ď„…](bold red)'

vimcmd_symbol = '[ď„„](bold green)'
vimcmd_visual_symbol = '[ď„„](bold yellow)'
vimcmd_replace_symbol = '[ď„„](bold purple)'
vimcmd_replace_one_symbol = '[ď„„](bold purple)'

[git_status]
format = '($all_status$ahead_behind )'
ahead = '[â†‘${count}](green)'
behind = '[â†“${count}](red)'
diverged = '[â†‘${ahead_count}](green) [â†“${behind_count}](red)'

[username]
disabled = true
[hostname]
disabled = true
