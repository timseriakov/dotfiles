customCommands:
  - key: "L"
    context: "files"
    description: "Choose commit message from LazyCommit suggestions"
    loadingText: "AI is generating commit suggestions..."
    prompts:
      - type: "menuFromCommand"
        key: "CommitMessage"
        title: "Select commit message"
        command: "fish /Users/tim/dev/dotfiles/lazygit/scripts/lazycommit-suggestions.fish"
        filter: "^(?P<msg>(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\(.+\\))?!?: .+)$"
        valueFormat: "{{ .msg }}"
        labelFormat: "{{ .msg | yellow }}"
      - type: "confirm"
        key: "ConfirmCommit"
        title: "Commit"
        body: "Commit with selected message?"
    command: "git commit -m '{{ .Form.CommitMessage }}'"

  - key: "S"
    context: "files"
    description: "Split diff (current file)"
    loadingText: "Rendering split diff..."
    output: terminal
    command: |
      env TERM=xterm-256color bash -lc 'git diff --no-ext-diff --color=always -- "{{.SelectedFile.Name}}" | git-split-diffs --color=16m | less -R'

  - key: "S"
    context: "commits"
    description: "Split diff (selected commit)"
    loadingText: "Rendering split diff..."
    output: terminal
    command: |
      env TERM=xterm-256color bash -lc 'git show --no-ext-diff --color=always {{.SelectedCommit.Sha}} | git-split-diffs --color=16m | less -R'

  - key: "G"
    context: "files"
    description: "Split diff (staged vs HEAD)"
    loadingText: "Rendering split diff..."
    output: terminal
    command: |
      env TERM=xterm-256color bash -lc 'git diff --cached --no-ext-diff --color=always -- "{{.SelectedFile.Name}}" | git-split-diffs --color=16m | less -R'

git:
  pagers:
    - colorArg: always
      pager: git-split-diffs --color=16m
      useConfigOnly: true

gui:
  theme:
    activeBorderColor:
      - "#88c0d0"
      - bold
    inactiveBorderColor:
      - "#4c566a"
    optionsTextColor:
      - "#81a1c1"
    selectedLineBgColor:
      - "#3d5a7a"
    cherryPickedCommitBgColor:
      - "#5e81ac"
    cherryPickedCommitFgColor:
      - "#eceff4"
    unstagedChangesColor:
      - "#d08770"
    defaultFgColor:
      - "#eceff4"
    searchingActiveBorderColor:
      - "#a3be8c"
