debug: false
yolo: false
max_context_size: 100000
max_capture_lines: 1000
wait_interval: 2

default_model: fast

models:
  fast:
    provider: openai
    model: "gpt-5-mini"
    api_key: "${OPENAI_API_KEY}"
  smart:
    provider: openai
    model: "gpt-5"
    api_key: "${OPENAI_API_KEY}"

exec_confirm: true
send_keys_confirm: true
paste_multiline_confirm: true

knowledge_base:
  auto_load:
    - terminal-macos-fish.md
