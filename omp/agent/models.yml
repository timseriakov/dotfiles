providers:
  omniroute:
    baseUrl: https://omniroute.e6ejok.easypanel.host/v1
    apiKey: OMNIROUTE_OMP_API_KEY
    api: openai-completions
    authHeader: true
    compat:
      supportsStore: false
      supportsDeveloperRole: true
      supportsReasoningEffort: true
      maxTokensField: max_tokens
      supportsUsageInStreaming: true
      supportsToolChoice: true
    models:
      - id: reasoning-main
        name: OmniRoute Reasoning Main
        reasoning: true
        input: [text, image]
        contextWindow: 400000
        maxTokens: 8192
