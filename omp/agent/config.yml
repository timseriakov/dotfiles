mcp:
  enableProjectConfig: true
skills:
  enableClaudeUser: false
  enableClaudeProject: false
commands:
  enableClaudeUser: false
  enableClaudeProject: false
lastChangelogVersion: 15.9.0
startup:
  quiet: true
theme:
  dark: starship-nord
colorBlindMode: false
showHardwareCursor: false
compaction:
  enabled: true
  strategy: context-full
  thresholdPercent: 85
  keepRecentTokens: 30000
  idleEnabled: false
statusLine:
  preset: custom
  separator: none
  leftSegments:
    - path
    - git
    - mode
    - context_pct
    - subagents
    - model
  rightSegments:
    - session_name
  segmentOptions:
    path:
      abbreviate: false
      maxLength: 32
      stripWorkPrefix: true
      lastSegment: true
    git:
      showBranch: true
      showStaged: true
      showUnstaged: true
      showUntracked: true
      compactDirty: true
      showAheadBehind: true
    model:
      showThinkingLevel: false
  sessionAccent: false
  showHookStatus: false
modelRoles:
  default: omniroute/cx/gpt-5.5-medium:medium
  smol: omniroute/quick-free
  slow: omniroute/deep-premium
  plan: omniroute/reasoning-main
  task: omniroute/coding-main
  vision: omniroute/reasoning-main
disabledProviders:
  - opencode
  - claude
  - cursor
  - gemini
  - windsurf
  - cline
  - mcp-json
  - vscode
  - codex
  - openai
  - claude-plugins
modelProviderOrder:
  - omniroute
symbolPreset: nerd
extensions:
  - /Users/tim/.omp/agent/extensions/starship-minimal-editor.ts
  - /Users/tim/.omp/agent/extensions/workmux-status.ts
hideThinkingBlock: true
setupVersion: 1
dev:
  autoqa:
    consent: granted
